spring.application.name=minha-universidade-api
server.port=8080

# PostgreSQL connection (overridable via env vars for Docker / prod)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/universidade}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Throw exception on unmapped routes so GlobalExceptionHandler can return JSON 404
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false
