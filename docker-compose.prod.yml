services:
  traefik:
    image: traefik:v3
    container_name: traefik
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # HTTP -> HTTPS redirect
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      # Let's Encrypt
      - --certificatesresolvers.letsencrypt.acme.email=helmutiarley@gmail.com
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/letsencrypt

  postgres:
    image: postgres:16-alpine
    container_name: universidade-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: universidade
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d universidade"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: universidade-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/universidade
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.universidade.rule=Host(`unifor.helmutiarley.cloud`)"
      - "traefik.http.routers.universidade.entrypoints=websecure"
      - "traefik.http.routers.universidade.tls.certresolver=letsencrypt"
      - "traefik.http.services.universidade.loadbalancer.server.port=8080"

volumes:
  postgres_data:
  traefik_certs:
